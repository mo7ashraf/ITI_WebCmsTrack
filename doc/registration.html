<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Fundamentals Lab 1</title>
    <link rel="stylesheet" href="../styles/style.css" />
  </head>
  <body>
    <header>
      <img src="../img/ITI_logo.png" alt="ITI Logo" width="300" />
      <ul>
        <li class="menu_item">
          <a href="../index.html" target="_self">Home</a>
        </li>
        <li class="menu_item">Road Map</li>
        <li class="menu_item">
          <a href="registration.html" target="_self">Registration Form</a>
        </li>
        <li class="menu_item">
          <a href="https://iti.gov.eg/home" target="_self">Contact</a>
        </li>
      </ul>
    </header>

    <div class="container">
      <h2 style="color: red; text-align: center">Registration Form</h2>
      <div class="form-container">
        <center>
          <form action="#" method="post">
            <table class="form-table">
              <tr>
                <td class="cell_name"><label for="name">Name:</label></td>
                <td class="cell_input">
                  <input type="text" id="name" name="name" required />
                </td>
              </tr>

              <tr>
                <td class="cell_name"><label for="email">Email:</label></td>
                <td class="cell_input">
                  <input type="email" id="email" name="email" required />
                </td>
              </tr>

              <tr>
                <td class="cell_name">
                  <label for="class_number">Class Number:</label>
                </td>
                <td class="cell_input">
                  <input
                    type="number"
                    id="class_number"
                    name="class_number"
                    required
                  />
                </td>
              </tr>

              <tr>
                <td colspan="2" style="text-align: center">
                  <input type="submit" value="Register" />
                </td>
              </tr>
            </table>
          </form>
        </center>
      </div>
    </div>
    <footer>
      <hr />
      <p style="text-align: center">Copyright 2026 &copy; Mohammed Ashraf</p>
    </footer>
  </body>
</html>
